<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Premium Zinseszins-Rechner (Standalone)</title>

    <!-- CSS Tailwind Base -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Styling -->
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        input[type=range] {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 8px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 2px solid #10b981;
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
    </style>

    <!-- React Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/prop-types@15.6/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">

    <div id="root"></div>

    <script type="text/babel">
        // Make sure we have the dependencies available globally
        const { useState, useMemo } = React;
        const { AreaChart, Area, Line, ComposedChart, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

        const formatCurrency = (value) =>
            new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(value);

        const InfoIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-4 h-4 text-slate-400 hover:text-emerald-500 transition-colors"}><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></svg>
        );
        const CalculatorIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-5 h-5"}><rect width="16" height="20" x="4" y="2" rx="2" /><line x1="8" x2="16" y1="6" y2="6" /><line x1="16" x2="16" y1="14" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></svg>
        );
        const TrendingUpIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-5 h-5"}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></svg>
        );
        const ClockIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-5 h-5"}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>
        );
        const CheckCircleIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-5 h-5"}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></svg>
        );

        // Fallback if Recharts isn't perfectly loaded yet
        if (!window.Recharts || !window.Recharts.AreaChart) {
            console.error("Recharts could not be loaded from window.Recharts.");
        }

        const InputSlider = ({ label, value, onChange, min, max, step, suffix, prefix, isCurrency, infoText }) => {
            const getSuffix = (val, suf) => (val === 1 && suf === " Jahre") ? " Jahr" : suf;
            const displayValue = isCurrency ? formatCurrency(value) : (`${prefix}${new Intl.NumberFormat('de-DE').format(value)}${getSuffix(value, suffix)}`);

            return (
                <div className="space-y-5">
                    <div className="flex justify-between items-center">
                        <label className="text-sm font-semibold text-slate-700 flex items-center gap-1.5">
                            {label}
                            {infoText && (
                                <div className="group relative cursor-help">
                                    <InfoIcon />
                                    <div className="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 w-48 p-2 bg-slate-800 text-white text-xs rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-10 text-center shadow-xl">
                                        {infoText}
                                        <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-slate-800 rotate-45"></div>
                                    </div>
                                </div>
                            )}
                        </label>
                        <div className="font-bold text-slate-900 bg-slate-100 px-3 py-1 rounded-lg whitespace-nowrap">
                            {displayValue}
                        </div>
                    </div>
                    <div>
                        <input
                            type="range"
                            min={min}
                            max={max}
                            step={step || 1}
                            value={value}
                            onChange={(e) => onChange(Number(e.target.value))}
                        />
                        <div className="flex justify-between text-xs text-slate-400 mt-1 font-medium">
                            <span>{isCurrency ? formatCurrency(min) : (prefix + min + getSuffix(min, suffix))}</span>
                            <span>{isCurrency ? formatCurrency(max) : (prefix + max + getSuffix(max, suffix))}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                const data = payload[0].payload;
                return (
                    <div className="bg-white/95 backdrop-blur-sm shadow-xl p-4 rounded-xl border border-slate-100">
                        <p className="font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">Nach {label} {label === 1 ? 'Jahr' : 'Jahren'}</p>
                        <div className="space-y-2">
                            <div className="flex justify-between items-center gap-6">
                                <span className="text-slate-500 flex items-center gap-1.5 font-medium"><div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#646464' }}></div> Einzahlung:</span>
                                <span className="font-bold text-slate-800">{formatCurrency(data.eingezahlt)}</span>
                            </div>
                            <div className="flex justify-between items-center gap-6">
                                <span className="text-[#006fb9] flex items-center gap-1.5 font-medium"><div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#006fb9' }}></div> Zinsertrag:</span>
                                <span className="font-bold text-slate-800">{formatCurrency(data.zinsen)}</span>
                            </div>
                            <div className="pt-2 mt-2 border-t border-slate-100 flex justify-between items-center gap-6">
                                <span className="text-[#023e84] flex items-center gap-1.5 font-bold"><div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#023e84' }}></div> Endkapital:</span>
                                <span className="font-bold text-[#023e84]">{formatCurrency(data.kapital)}</span>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const ZinseszinsRechner = () => {
            const [startkapital, setStartkapital] = useState(5000);
            const [sparrate, setSparrate] = useState(100);
            const [dauer, setDauer] = useState(1);
            const [rendite, setRendite] = useState(6.5);

            const calculationData = useMemo(() => {
                let currentKapital = startkapital;
                let currentEingezahlt = startkapital;
                let currentSparrate = sparrate;
                const data = [];
                let breakEvenMonthTotal = null;

                data.push({
                    jahr: 0,
                    kapital: currentKapital,
                    eingezahlt: currentEingezahlt,
                    zinsen: 0,
                });

                for (let j = 1; j <= dauer; j++) {
                    let eingezahltJahr = 0;
                    let kapitalStartJahr = currentKapital;

                    if (currentSparrate === 0) {
                        currentKapital *= (1 + (rendite / 100));
                        if (breakEvenMonthTotal === null && (currentKapital - currentEingezahlt) > currentEingezahlt && currentEingezahlt > 0) {
                            breakEvenMonthTotal = j * 12;
                        }
                    } else {
                        for (let m = 0; m < 12; m++) {
                            currentKapital += currentSparrate;
                            currentEingezahlt += currentSparrate;
                            eingezahltJahr += currentSparrate;
                            currentKapital *= (1 + (rendite / 100) / 12);

                            if (breakEvenMonthTotal === null && (currentKapital - currentEingezahlt) > currentEingezahlt && currentEingezahlt > 0) {
                                breakEvenMonthTotal = (j - 1) * 12 + (m + 1);
                            }
                        }
                    }

                    let zinsgewinnJahr = (currentKapital - kapitalStartJahr) - eingezahltJahr;

                    data.push({
                        jahr: j,
                        kapital: Math.round(currentKapital),
                        eingezahlt: Math.round(currentEingezahlt),
                        zinsen: Math.round(currentKapital - currentEingezahlt),
                    });
                }

                let waitingKapital = 0;
                if (dauer > 5) {
                    let wKapital = startkapital;
                    let wSparrate = sparrate;
                    for (let j = 1; j <= (dauer - 5); j++) {
                        if (wSparrate === 0) {
                            wKapital *= (1 + (rendite / 100));
                        } else {
                            for (let m = 0; m < 12; m++) {
                                wKapital += wSparrate;
                                wKapital *= (1 + (rendite / 100) / 12);
                            }
                        }
                    }
                    waitingKapital = Math.round(wKapital);
                }

                const finalData = data[data.length - 1];
                const kostenDesWartens = finalData.kapital - waitingKapital;

                return {
                    chartData: data,
                    endkapital: finalData.kapital,
                    eingezahltTotal: finalData.eingezahlt,
                    zinsenTotal: finalData.zinsen,
                    breakEvenMonthTotal,
                    kostenDesWartens
                };
            }, [startkapital, sparrate, dauer, rendite]);

            const { chartData, endkapital, eingezahltTotal, zinsenTotal, breakEvenMonthTotal, kostenDesWartens } = calculationData;

            return (
                <div className="grid grid-cols-1 lg:grid-cols-[240px_1fr_240px] xl:grid-cols-[250px_1fr_250px] gap-6 xl:gap-8 items-stretch pt-6">
                    <div className="flex flex-col gap-4 h-full">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-3">
                            <div className="p-2.5 bg-[#006fb9]/10 text-[#006fb9] rounded-xl">
                                <CalculatorIcon />
                            </div>
                            <h2 className="text-xl font-bold text-[#023e84]">Ihre Parameter</h2>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <InputSlider label="Startkapital" value={startkapital} onChange={setStartkapital} min={0} max={100000} step={1000} isCurrency={true} prefix="" suffix="" infoText="" />
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <InputSlider label="Monatliche Sparrate" value={sparrate} onChange={setSparrate} min={0} max={1000} step={50} isCurrency={true} prefix="" suffix="" infoText="" />
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <InputSlider label="Erwartete Rendite (p.a.)" value={rendite} onChange={setRendite} min={0} max={12} step={0.5} suffix=" %" prefix="" isCurrency={false} infoText="Durchschnittliche Rendite am Aktienmarkt" />
                        </div>
                    </div>

                    {/* MIDDLE COLUMN: Slider & Chart */}
                    <div className="flex flex-col gap-6 h-full">
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-3">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-2 bg-[#006fb9]/10 text-[#006fb9] rounded-lg shrink-0">
                                    <ClockIcon />
                                </div>
                                <h4 className="font-bold text-[#023e84]">Spielen Sie mit der Zeit – dem wichtigsten Faktor für den Zinseszins!</h4>
                            </div>
                            <InputSlider label="Anlagedauer" value={dauer} onChange={setDauer} min={1} max={50} step={1} suffix=" Jahre" prefix="" isCurrency={false} infoText="" />
                        </div>

                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex-1 flex flex-col">
                            <div className="flex flex-col gap-3 mb-6 mt-2 text-left">
                                <h3 className="text-lg font-bold text-[#023e84] !mb-0" style={{ margin: 0 }}>Kapitalentwicklung</h3>
                                <div className="flex items-center gap-5 text-sm font-medium flex-wrap">
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full" style={{ backgroundColor: '#023e84' }}></div><span className="text-slate-600">Endkapital</span></div>
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full" style={{ backgroundColor: '#646464' }}></div><span className="text-slate-600">Einzahlung</span></div>
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full" style={{ backgroundColor: '#006fb9' }}></div><span className="text-slate-600">Zinsertrag</span></div>
                                </div>
                            </div>
                            <div style={{ height: '250px', width: '100%' }}>
                                <ResponsiveContainer width="100%" height="100%">
                                    <ComposedChart data={chartData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="colorKapital" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#023e84" stopOpacity={0.4} />
                                                <stop offset="95%" stopColor="#023e84" stopOpacity={0.05} />
                                            </linearGradient>
                                            <linearGradient id="colorEinzahlung" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#646464" stopOpacity={0.4} />
                                                <stop offset="95%" stopColor="#646464" stopOpacity={0.05} />
                                            </linearGradient>
                                        </defs>
                                        <XAxis dataKey="jahr" axisLine={false} tickLine={false} tick={{ fontSize: 12 }} dy={10} />
                                        <YAxis
                                            tickFormatter={(val) => `${new Intl.NumberFormat('de-DE').format(val)} €`}
                                            axisLine={false}
                                            tickLine={false}
                                            tick={{ fill: '#64748b', fontSize: 12 }}
                                            dx={-10}
                                            width={110}
                                        />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Area
                                            type="monotone"
                                            dataKey="kapital"
                                            stroke="none"
                                            fill="url(#colorKapital)"
                                        />
                                        <Area
                                            type="monotone"
                                            dataKey="eingezahlt"
                                            stroke="none"
                                            fill="url(#colorEinzahlung)"
                                        />
                                        <Line type="monotone" dataKey="kapital" stroke="#023e84" strokeWidth={2} dot={false} activeDot={{ r: 4 }} />
                                        <Line type="monotone" dataKey="eingezahlt" stroke="#646464" strokeWidth={2} dot={false} activeDot={{ r: 4 }} />
                                        <Line type="monotone" dataKey="zinsen" stroke="#006fb9" strokeWidth={2} dot={false} activeDot={{ r: 4 }} />
                                    </ComposedChart>
                                </ResponsiveContainer>
                            </div>

                            {breakEvenMonthTotal && (
                                <div className="mt-auto pt-6">
                                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 text-sm flex items-start gap-4">
                                        <div className="p-2 bg-blue-100/50 text-blue-600 rounded-lg shrink-0 mt-0.5">
                                            <CheckCircleIcon />
                                        </div>
                                        <div>
                                            <strong className="text-[#023e84] block mb-1">Meilenstein:</strong>
                                            Nach <span className="font-bold text-slate-800">{Math.floor(breakEvenMonthTotal / 12)} {Math.floor(breakEvenMonthTotal / 12) === 1 ? 'Jahr' : 'Jahren'}{breakEvenMonthTotal % 12 > 0 ? ` und ${breakEvenMonthTotal % 12} ${breakEvenMonthTotal % 12 === 1 ? 'Monat' : 'Monaten'}` : ''}</span> sind Ihre gesamten Zinserträge so hoch wie Ihre kumulierten Einzahlungen.
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* RIGHT COLUMN: Results */}
                    <div className="flex flex-col gap-4 h-full">
                        <div className="bg-[#023e84] p-6 rounded-2xl shadow-lg relative overflow-hidden text-white group">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl group-hover:bg-white/20 transition-all"></div>
                            <p className="text-blue-100 text-sm font-medium mb-1">Endkapital</p>
                            <h3 className="text-3xl font-black">{formatCurrency(endkapital)}</h3>
                            <div className="mt-4 pt-4 border-t border-[#006fb9]/50 flex justify-between text-sm">
                                <span className="text-blue-200">Eingezahlt:</span>
                                <span className="text-white font-medium">{formatCurrency(eingezahltTotal)}</span>
                            </div>
                        </div>

                        <div className="bg-[#006fb9]/10 border border-[#006fb9]/20 p-5 rounded-2xl shadow-sm flex flex-col justify-center">
                            <div className="flex items-center gap-2 mb-2">
                                <TrendingUpIcon className="w-5 h-5 text-[#006fb9]" />
                                <h4 className="font-bold text-[#023e84]">Zinsanteil</h4>
                            </div>
                            <p className="font-bold text-lg text-[#006fb9] block">{formatCurrency(zinsenTotal)}</p>
                            <p className="text-[#023e84]/80 text-xs mt-1">Das sind <span className="font-bold">{((zinsenTotal / endkapital) * 100).toFixed(1)}%</span> des gesamten Endkapitals.</p>
                        </div>

                        <div className="bg-[#646464]/10 border border-[#646464]/20 p-5 rounded-2xl shadow-sm flex flex-col justify-center">
                            <div className="flex items-center gap-2 mb-2">
                                <ClockIcon className="w-5 h-5 text-[#646464]" />
                                <h4 className="font-bold text-[#023e84]">Kosten des Wartens</h4>
                            </div>
                            <p className="font-bold text-lg text-[#646464] block">{formatCurrency(kostenDesWartens)}</p>
                            <p className="text-[#646464]/90 text-xs mt-1">entgehen Ihnen, wenn Sie 5 Jahre warten.</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => (
            <div className="max-w-7xl mx-auto space-y-8">
                <div className="text-center space-y-2">
                    <h1 className="text-3xl font-bold text-[#023e84]">Die Macht des Zinseszinses</h1>
                    <p className="text-lg text-slate-600">Simulieren Sie, wie aus Zeit und Rendite Ihr Vermögen entsteht.</p>
                </div>
                <ZinseszinsRechner />
            </div>
        );

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);

    </script>
</body>

</html>
